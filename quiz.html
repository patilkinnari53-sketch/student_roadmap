        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');

        // --- Functions ---

        // Check for Resume on load
        window.addEventListener('DOMContentLoaded', () => {
            const savedState = localStorage.getItem('quiz_persistence');
            if (savedState) {
                try {
                    const state = JSON.parse(savedState);
                    const actionsContainer = document.getElementById('quiz-actions');
                    const resumeBtn = document.createElement('button');
                    resumeBtn.className = "group bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold py-4 px-8 rounded-2xl transition-all flex items-center";
                    resumeBtn.innerHTML = `<span>Resume Quiz (Q${state.currentQuestion + 1})</span> <i class="fas fa-redo ml-2 group-hover:rotate-180 transition-transform duration-500"></i>`;
                    resumeBtn.onclick = () => startQuiz(true);
                    actionsContainer.appendChild(resumeBtn);
                } catch (e) {
                    localStorage.removeItem('quiz_persistence');
                }
            }
        });

        // Prompt before leaving if quiz is in progress
        window.addEventListener('beforeunload', (e) => {
            const savedState = localStorage.getItem('quiz_persistence');
            if (savedState) {
                e.preventDefault();
                e.returnValue = ''; // Standard for Chrome
            }
        });

        function startQuiz(resume = false) {
            if (!resume) {
                localStorage.removeItem('quiz_persistence');
                currentQuestion = 0;
                scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
                
                localStorage.setItem('quiz_persistence', JSON.stringify({
                    currentQuestion: 0,
                    scores: scores,
                    timestamp: Date.now()
                }));
            } else {
                const savedState = localStorage.getItem('quiz_persistence');
                if (savedState) {
                    const state = JSON.parse(savedState);
                    currentQuestion = state.currentQuestion;
                    scores = state.scores;
                }
            }
            
            startScreen.classList.add('hidden');
            quizHeader.classList.remove('hidden');
            questionScreen.classList.remove('hidden');
            questionScreen.classList.add('fade-in');
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            
            // Apply animation class
            questionText.classList.remove('slide-up');
            void questionText.offsetWidth; // Trigger reflow
            questionText.classList.add('slide-up');
            questionText.textContent = q.text;

            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option-card group p-4 md:p-5 rounded-xl flex items-center space-x-3 border-2 transition-all duration-300';
                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-lg bg-slate-100 group-hover:bg-white flex items-center justify-center font-bold text-slate-500 group-hover:text-primary-600 transition-colors text-sm">
                        ${String.fromCharCode(65 + index)}
                    </div>
                    <p class="text-sm md:text-base font-semibold text-slate-700 group-hover:text-slate-900 leading-tight">${opt.text}</p>
                `;
                btn.onclick = () => handleAnswer(opt.type, btn);
                
                // Staggered animation for options
                btn.style.opacity = '0';
                btn.style.animation = `slideUp 0.4s ease forwards ${index * 0.1}s`;
                
                optionsContainer.appendChild(btn);
            });

            // Update Progress
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            progressFill.style.width = `${progress}%`;
            questionCounter.textContent = `${currentQuestion + 1}/${questions.length}`;
        }

        function handleAnswer(type, selectedBtn) {
            // Visual feedback
            const allOptions = optionsContainer.children;
            for (let btn of allOptions) {
                btn.classList.remove('selected');
                btn.style.pointerEvents = 'none'; // Prevent double clicks
                btn.style.opacity = '0.5';
            }
            selectedBtn.classList.add('selected');
            selectedBtn.style.opacity = '1';

            // Record Score
            scores[type]++;
            
            // Save persistence state
            localStorage.setItem('quiz_persistence', JSON.stringify({
                currentQuestion: currentQuestion + 1,
                scores: scores,
                timestamp: Date.now()
            }));

            // Delay for next question
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    renderQuestion();
                } else {
                    showResults();
                }
            }, 400);
        }

        function showResults() {
            // Hide Quiz UI
            questionScreen.classList.add('hidden');
            quizHeader.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            // Calculate Winner
            let maxScore = -1;
            let winner = 'A'; // default

            for (const [key, value] of Object.entries(scores)) {
                if (value > maxScore) {
                    maxScore = value;
                    winner = key;
                }
            }

            // Populate Data
            const resultData = results[winner];
            document.getElementById('result-title').innerText = resultData.title;
            document.getElementById('result-desc').innerText = resultData.desc;
            document.getElementById('result-icon').innerText = resultData.icon;
            
            // Update Colors dynamically based on winner
            const resultIcon = document.getElementById('result-icon');
            const resultTitleLabel = document.querySelector('#result-screen h2');
            const roadmapBtn = document.querySelector('#result-screen button');
            const resultCard = document.querySelector('.result-card');
            const topBar = resultCard.querySelector('.absolute.top-0');

            // Reset classes
            resultTitleLabel.className = `text-sm font-bold uppercase tracking-widest mb-2 text-${resultData.color}-600`;
            roadmapBtn.className = `w-full bg-${resultData.color}-600 hover:bg-${resultData.color}-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition hover:-translate-y-1 flex items-center justify-center group`;
            topBar.className = `absolute top-0 left-0 w-full h-2 bg-${resultData.color}-500`;

            // Populate Career List with clickable links
            const list = document.getElementById('career-list');
            list.innerHTML = '';
            
            resultData.career_links.forEach(career => {
                const li = document.createElement('li');
                li.className = "group/item";
                li.innerHTML = `
                    <a href="career_roadmap.php?career=${career.slug}" class="flex items-center p-3 hover:bg-white hover:shadow-md rounded-xl transition-all duration-300 border border-transparent hover:border-${resultData.color}-100">
                        <div class="w-8 h-8 rounded-lg bg-${resultData.color}-100 flex items-center justify-center mr-4 group-hover/item:scale-110 transition-transform">
                            <i class="fas fa-arrow-right text-${resultData.color}-600 text-xs"></i>
                        </div>
                        <span class="text-gray-700 font-semibold group-hover/item:text-gray-900">${career.name}</span>
                        <span class="ml-auto text-xs font-medium text-gray-400 group-hover/item:text-${resultData.color}-500 flex items-center">
                            View Roadmap <i class="fas fa-chevron-right ml-2"></i>
                        </span>
                    </a>
                `;
                list.appendChild(li);
            });

            // Set Roadmap Link
            window.viewRoadmap = () => window.location.href = 'roadmap.php';

            // Confetti Effect
            fireConfetti();
            
            // Clear persistence
            localStorage.removeItem('quiz_persistence');
        }

        function resetQuiz() {
            localStorage.removeItem('quiz_persistence');
            currentQuestion = 0;
            scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            startScreen.classList.add('fade-in');
        }

        // --- Confetti Logic (Simple Canvas Implementation) ---
        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const particles = [];
            const particleCount = 150;
            const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b', '#3b82f6'];

            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15 - 5, // Upward bias
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10,
                    gravity: 0.2,
                    drag: 0.96
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let activeParticles = false;

                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.vx *= p.drag;
                    p.vy *= p.drag;
                    p.rotation += p.rotationSpeed;

                    if (p.y < canvas.height) {
                        activeParticles = true;
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate((p.rotation * Math.PI) / 180);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                        ctx.restore();
                    }
                });

                if (activeParticles) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
            }

            animate();
        }
        
        // Resize canvas on window resize
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>

    <!-- Back to Top Button -->
    <button id="backToTop"
        class="fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-br from-primary-500 to-secondary-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all duration-300 z-50 opacity-0 translate-y-4 transition-all">
        <i class="fas fa-arrow-up text-xl"></i>
    </button>

    <script src="assets/js/auth.js"></script>
    <script>
        // Back to top button functionality
        const backToTopBtn = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) {
                backToTopBtn.style.opacity = '1';
                backToTopBtn.style.transform = 'translateY(0)';
            } else {
                backToTopBtn.style.opacity = '0';
                backToTopBtn.style.transform = 'translateY(1rem)';
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
