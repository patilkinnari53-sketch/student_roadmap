<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Student Roadmap — Your Career Navigation Platform</title>
  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Comprehensive career guidance platform for Indian students after 10th & 12th. Get personalized roadmaps, career quizzes, and expert advice.">
  <meta name="keywords"
    content="career guidance, student roadmap, after 10th, after 12th, career quiz, engineering, medical, commerce, arts">
  <meta name="author" content="StudentRoadmap">
  <meta property="og:title" content="Student Roadmap — Your Career Navigation Platform">
  <meta property="og:description" content="Plan your career journey with expert guidance and personalized roadmaps">
  <meta property="og:type" content="website">
  <meta property="og:image"
    content="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200&h=630&fit=crop">
  <!-- Performance Optimizations -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <meta name="color-scheme" content="light" />
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind with optimized plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '475px',
            '3xl': '1920px',
          },
          colors: {
            green: {
              50: '#f0fdf4',
              500: '#22c55e',
              600: '#16a34a',
            },
            primary: {
              50: '#f0fcff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
            secondary: {
              500: '#8b5cf6',
              600: '#7c3aed',
            },
            gradient: {
              start: '#e0f2fe',
              end: '#f0fcff',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.8s ease-in-out',
            'slide-in-right': 'slideInRight 0.6s ease-out',
            'slide-in-left': 'slideInLeft 0.6s ease-out',
            'bounce-subtle': 'bounceSubtle 2s infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'text-reveal': 'textReveal 0.8s ease-out forwards',
            'pulse-subtle': 'pulseSubtle 3s ease-in-out infinite',
            'slide-right-to-left': 'slideRightToLeft 20s linear infinite',
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2s infinite',
            'wave': 'wave 12s linear infinite',
            'scale-up': 'scaleUp 0.3s ease-out',
            'blob': 'blob 7s infinite',
            'gradient-shift': 'gradientShift 3s ease infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInRight: {
              '0%': { transform: 'translateX(100px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            slideInLeft: {
              '0%': { transform: 'translateX(-100px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            },
            glow: {
              '0%': { boxShadow: '0 0 5px rgba(14, 165, 233, 0.3)' },
              '100%': { boxShadow: '0 0 20px rgba(14, 165, 233, 0.6)' },
            },
            textReveal: {
              '0%': {
                backgroundSize: '0% 100%',
                opacity: '0',
                transform: 'translateY(20px)'
              },
              '100%': {
                backgroundSize: '100% 100%',
                opacity: '1',
                transform: 'translateY(0)'
              },
            },
            pulseSubtle: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            },
            slideRightToLeft: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' },
            },
            wave: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            scaleUp: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            gradientShift: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
          },
        }
      }
    }
  </script>
  <!-- Enhanced Styles -->
  <style>
    /* Critical CSS */
    :root {
      --primary-color: #0ea5e9;
      --primary-dark: #0284c7;
      --secondary-color: #8b5cf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #f8fafc 0%, #f0f9ff 100%);
    }

    /* Smooth scrolling */
    html {
      scroll-behavior: smooth;
    }

    /* Page Background with animated gradient */
    .page-bg {
      background: linear-gradient(-45deg, #f0f9ff, #e0f2fe, #f8fafc, #f0f9ff);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background elements */
    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.1;
      z-index: 0;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      top: -250px;
      right: -250px;
      animation: blob 20s infinite;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #8b5cf6, #0ea5e9);
      bottom: -200px;
      left: -200px;
      animation: blob 25s infinite reverse;
    }

    /* Header Styles - Fixed visibility */
    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.1);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .header-glass {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.1);
      padding: 1rem 2rem;
    }

    /* Navigation Menu */
    .nav-menu {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      color: #1e293b;
      font-weight: 500;
      text-decoration: none;
      transition: color 0.3s ease;
      position: relative;
    }

    .nav-link:hover {
      color: #0ea5e9;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      transition: width 0.3s ease;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    /* Mobile menu button */
    .mobile-menu-btn {
      display: none;
      flex-direction: column;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px;
    }

    .mobile-menu-btn span {
      width: 25px;
      height: 2px;
      background: #1e293b;
      transition: all 0.3s ease;
    }

    @media (max-width: 768px) {
      .nav-menu.desktop {
        display: none;
      }
      
      .mobile-menu-btn {
        display: flex;
      }
    }

    /* Enhanced Cards */
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow:
        0 8px 32px rgba(14, 165, 233, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .gradient-border {
      position: relative;
      border-radius: 1.5rem;
    }

    .gradient-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6, #0ea5e9);
      border-radius: 1.5rem;
      z-index: -1;
      opacity: 0.3;
      filter: blur(10px);
    }

    /* Enhanced Buttons */
    .btn-gradient {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-gradient:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(14, 165, 233, 0.3);
    }

    .btn-gradient::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s ease;
    }

    .btn-gradient:hover::after {
      left: 100%;
    }

    /* Footer Styles */
    footer {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(14, 165, 233, 0.1);
      padding: 3rem 0 1.5rem;
      margin-top: 4rem;
    }

    .footer-link {
      color: #64748b;
      text-decoration: none;
      transition: color 0.3s ease;
      display: inline-block;
      margin-bottom: 0.5rem;
    }

    .footer-link:hover {
      color: #0ea5e9;
      transform: translateX(5px);
    }

    .social-link {
      width: 40px;
      height: 40px;
      background: rgba(14, 165, 233, 0.1);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #0ea5e9;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: #0ea5e9;
      color: white;
      transform: translateY(-3px);
    }

    /* Responsive Utilities */
    @media (max-width: 768px) {
      .mobile-stack {
        flex-direction: column;
      }

      .mobile-center {
        text-align: center;
      }

      .mobile-padding {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }

    /* Focus Styles */
    :focus {
      outline: 2px solid #0ea5e9;
      outline-offset: 2px;
    }

    /* Animation Delays */
    .animation-delay-200 { animation-delay: 200ms; }
    .animation-delay-400 { animation-delay: 400ms; }
    .animation-delay-600 { animation-delay: 600ms; }
    .animation-delay-800 { animation-delay: 800ms; }
    .animation-delay-1000 { animation-delay: 1000ms; }
    .animation-delay-2000 { animation-delay: 2000ms; }

    /* New Reveal Animation */
    @keyframes revealUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .reveal-up {
      opacity: 0;
      animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    :focus:not(:focus-visible) {
      outline: none;
    }

    /* Mobile Menu Styles */
    .mobile-menu {
      transition: transform 0.3s ease-in-out;
    }
    
    .mobile-menu.-translate-x-full {
      transform: translateX(-100%);
    }
    
    .z-50 {
      z-index: 50;
    }
  </style>
</head>

<body class="text-slate-800">
  <!-- Animated Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
  </div>

  <!-- Include Header -->
  <div id="header-placeholder"></div>

  <!-- Main Content -->
  <main class="page-bg relative z-10">
    <div class="container mx-auto px-4 py-8">
      <!-- Your page content here -->
      <h1 class="text-4xl font-bold text-center">Welcome to StudentRoadmap</h1>
      <!-- ... rest of your page content ... -->
    </div>
  </main>

  <!-- Include Footer -->
  <div id="footer-placeholder"></div>

  <!-- Back to Top Button -->
  <button id="backToTop"
    class="fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-br from-primary-500 to-secondary-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all duration-300 z-50 opacity-0 translate-y-4 transition-all">
    <i class="fas fa-arrow-up text-xl"></i>
  </button>

  <!-- JavaScript for loading includes and other functionality -->
  <script>
    // Function to load HTML includes
    async function loadInclude(elementId, filePath) {
      try {
        const response = await fetch(filePath);
        const html = await response.text();
        document.getElementById(elementId).innerHTML = html;
      } catch (error) {
        console.error('Error loading include:', error);
      }
    }

    // Load header and footer
    document.addEventListener('DOMContentLoaded', async () => {
      await loadInclude('header-placeholder', 'header.html');
      await loadInclude('footer-placeholder', 'footer.html');

      // Back to Top Button
      const backToTop = document.getElementById('backToTop');

      window.addEventListener('scroll', () => {
        if (window.scrollY > 500) {
          backToTop.classList.remove('opacity-0', 'translate-y-4');
          backToTop.classList.add('opacity-100', 'translate-y-0');
        } else {
          backToTop.classList.remove('opacity-100', 'translate-y-0');
          backToTop.classList.add('opacity-0', 'translate-y-4');
        }
      });

      backToTop?.addEventListener('click', () => {
        window.scrollTo({
          top: 0,
          behavior: 'smooth'
        });
      });

      // Lazy Loading Images
      const lazyImages = document.querySelectorAll('img[loading="lazy"]');
      const imageObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            img.src = img.dataset.src || img.src;
            imageObserver.unobserve(img);
          }
        });
      });

      lazyImages.forEach(img => imageObserver.observe(img));

      // Add loading animation for cards
      const cards = document.querySelectorAll('.glass-card');
      cards.forEach(card => {
        card.addEventListener('mouseenter', () => {
          card.style.transform = 'translateY(-8px)';
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform = 'translateY(0)';
        });
      });
    });
  </script>
</body>
</html>
