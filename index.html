<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Student Roadmap — Your Career Navigation Platform</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Comprehensive career guidance platform for Indian students after 10th & 12th. Get personalized roadmaps, career quizzes, and expert advice.">
  <meta name="keywords" content="career guidance, student roadmap, after 10th, after 12th, career quiz, engineering, medical, commerce, arts">
  <meta name="author" content="StudentRoadmap">
  <meta property="og:title" content="Student Roadmap — Your Career Navigation Platform">
  <meta property="og:description" content="Plan your career journey with expert guidance and personalized roadmaps">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200&h=630&fit=crop">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <meta name="color-scheme" content="light" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  
  <!-- Custom CSS - Place these in the correct order -->
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/chatbot.css">
  
  <script src="assets/js/auth.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          screens: {
            'xs': '475px',
            '3xl': '1920px',
          },
          colors: {
            green: {
              50: '#f0fdf4',
              500: '#22c55e',
              600: '#16a34a',
            },
            primary: {
              50: '#f0fcff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
            secondary: {
              500: '#8b5cf6',
              600: '#7c3aed',
            },
            gradient: {
              start: '#e0f2fe',
              end: '#f0fcff',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.8s ease-in-out',
            'slide-in-right': 'slideInRight 0.6s ease-out',
            'slide-in-left': 'slideInLeft 0.6s ease-out',
            'bounce-subtle': 'bounceSubtle 2s infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'text-reveal': 'textReveal 0.8s ease-out forwards',
            'pulse-subtle': 'pulseSubtle 3s ease-in-out infinite',
            'slide-right-to-left': 'slideRightToLeft 20s linear infinite',
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2s infinite',
            'wave': 'wave 12s linear infinite',
            'scale-up': 'scaleUp 0.3s ease-out',
            'blob': 'blob 7s infinite',
            'gradient-shift': 'gradientShift 3s ease infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            slideInRight: {
              '0%': { transform: 'translateX(100px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            slideInLeft: {
              '0%': { transform: 'translateX(-100px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            bounceSubtle: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-5px)' },
            },
            glow: {
              '0%': { boxShadow: '0 0 5px rgba(14, 165, 233, 0.3)' },
              '100%': { boxShadow: '0 0 20px rgba(14, 165, 233, 0.6)' },
            },
            textReveal: {
              '0%': {
                backgroundSize: '0% 100%',
                opacity: '0',
                transform: 'translateY(20px)'
              },
              '100%': {
                backgroundSize: '100% 100%',
                opacity: '1',
                transform: 'translateY(0)'
              },
            },
            pulseSubtle: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            },
            slideRightToLeft: {
              '0%': { transform: 'translateX(100%)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-1000px 0' },
              '100%': { backgroundPosition: '1000px 0' },
            },
            wave: {
              '0%': { transform: 'translateX(0)' },
              '100%': { transform: 'translateX(-100%)' },
            },
            scaleUp: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            gradientShift: {
              '0%, 100%': { backgroundPosition: '0% 50%' },
              '50%': { backgroundPosition: '100% 50%' },
            },
          },
        }
      }
    }
  </script>
  
  <!-- Critical CSS -->
  <style>
    :root {
      --primary-color: #0ea5e9;
      --primary-dark: #0284c7;
      --secondary-color: #8b5cf6;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: linear-gradient(135deg, #f8fafc 0%, #f0f9ff 100%);
    }

    html {
      scroll-behavior: smooth;
    }

    .page-bg {
      background: linear-gradient(-45deg, #f0f9ff, #e0f2fe, #f8fafc, #f0f9ff);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.1;
      z-index: 0;
    }

    .blob-1 {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #0ea5e9, #8b5cf6);
      top: -250px;
      right: -250px;
      animation: blob 20s infinite;
    }

    .blob-2 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #8b5cf6, #0ea5e9);
      bottom: -200px;
      left: -200px;
      animation: blob 25s infinite reverse;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(14, 165, 233, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .btn-gradient {
      background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-gradient:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(14, 165, 233, 0.3);
    }

    .btn-gradient::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.6s ease;
    }

    .btn-gradient:hover::after {
      left: 100%;
    }

    .feature-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .feature-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.1), rgba(139, 92, 246, 0.1));
      border-radius: 16px;
    }

    @media (max-width: 768px) {
      .mobile-stack {
        flex-direction: column;
      }
      .mobile-center {
        text-align: center;
      }
    }

    .reveal-up {
      opacity: 0;
      animation: revealUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    @keyframes revealUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="text-slate-800">
  <!-- Animated Background Elements -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
  </div>
  
  <!-- Header Include -->
  <div id="header"></div>
  
  <!-- Main Content -->
  <main class="page-bg relative z-10">
    <div class="container mx-auto px-4 py-8">
      <!-- ... rest of your content remains exactly the same ... -->
      <!-- (Keep all your existing content from line 330 onwards) -->
      
      <!-- Footer Include -->
      <div id="footer"></div>
    </div>
  </main>
  
  <!-- Back to Top Button -->
  <button id="backToTop" class="fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-br from-primary-500 to-secondary-500 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-all duration-300 z-50 opacity-0 translate-y-4">
    <i class="fas fa-arrow-up text-xl"></i>
  </button>
  
  <!-- Chatbot -->
  <link rel="stylesheet" href="assets/css/chatbot.css">
  <div class="chatbot-container">
    <button id="chatbotToggle" class="chatbot-toggle" aria-label="Open Chat">
      <i class="fas fa-comment-dots"></i>
    </button>
    
    <div id="chatbotWindow" class="chatbot-window">
      <div class="chatbot-header">
        <div class="chatbot-header-info">
          <div class="chatbot-avatar">
            <i class="fas fa-robot text-white"></i>
          </div>
          <div>
            <div class="chatbot-title">Roadmap Assistant</div>
            <div class="chatbot-status">Online</div>
          </div>
        </div>
        <button id="closeChatbot" class="text-white hover:opacity-70 transition-opacity">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div id="chatbotMessages" class="chatbot-messages">
        <!-- Messages will appear here -->
      </div>
      
      <form id="chatbotForm" class="chatbot-input-area">
        <input type="text" id="chatbotInput" class="chatbot-input" placeholder="Ask me anything..." autocomplete="off">
        <button type="submit" class="chatbot-send">
          <i class="fas fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>
  
  <!-- Scripts -->
  <script>
    // Back to Top Button
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 500) {
        backToTop.classList.remove('opacity-0', 'translate-y-4');
        backToTop.classList.add('opacity-100', 'translate-y-0');
      } else {
        backToTop.classList.remove('opacity-100', 'translate-y-0');
        backToTop.classList.add('opacity-0', 'translate-y-4');
      }
    });
    backToTop?.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    // Load Header and Footer
    document.addEventListener('DOMContentLoaded', () => {
      // Load header
      fetch('components/header.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('header').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));
      
      // Load footer
      fetch('components/footer.html')
        .then(response => response.text())
        .then(data => {
          document.getElementById('footer').innerHTML = data;
        })
        .catch(error => console.error('Error loading footer:', error));
    });
  </script>
  
  <!-- Chatbot Script -->
  <script src="assets/js/chatbot.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
