<!-- Simple Responsive Header -->
<header style="background: white; border-bottom: 2px solid #0ea5e9; padding: 12px 0; font-family: 'Poppins', sans-serif; position: sticky; top: 0; z-index: 1000;">
  <div style="max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between;">
    
    <!-- Logo -->
    <a href="index.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #0ea5e9, #8b5cf6); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;">
        🎓
      </div>
      <span style="font-size: 20px; font-weight: bold; color: #1e293b;">StudentRoadmap</span>
    </a>
    
    <!-- Desktop Navigation -->
    <nav class="desktop-nav" style="display: flex; gap: 30px;">
      <a href="index.html" style="text-decoration: none; color: #4b5563; font-weight: 500;">Home</a>
      <a href="roadmap.html" style="text-decoration: none; color: #4b5563; font-weight: 500;">Roadmaps</a>
      <a href="quiz.html" style="text-decoration: none; color: #4b5563; font-weight: 500;">Quiz</a>
      <a href="about.html" style="text-decoration: none; color: #4b5563; font-weight: 500;">About</a>
      <a href="contact.html" style="text-decoration: none; color: #4b5563; font-weight: 500;">Contact</a>
    </nav>
    
    <!-- Desktop Auth Buttons -->
    <div class="desktop-auth" style="display: flex; gap: 15px;">
      <a href="login.html" style="text-decoration: none; color: #0ea5e9; font-weight: 600;">Sign In</a>
      <a href="signup.html" style="background: #0ea5e9; color: white; text-decoration: none; font-weight: 600; padding: 10px 24px; border-radius: 30px;">Get Started</a>
    </div>
    
    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" style="display: none; background: none; border: none; font-size: 24px; cursor: pointer; color: #0ea5e9; padding: 10px;">
      ☰
    </button>
  </div>

  <!-- Mobile Menu - HIDDEN BY DEFAULT -->
  <div id="mobileMenu" style="display: none; background: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; position: absolute; left: 0; top: 100%;">
    <nav style="display: flex; flex-direction: column; gap: 15px;">
      <a href="index.html" style="text-decoration: none; color: #1e293b; padding: 12px; border-bottom: 1px solid #e2e8f0; display: block;">Home</a>
      <a href="roadmap.html" style="text-decoration: none; color: #1e293b; padding: 12px; border-bottom: 1px solid #e2e8f0; display: block;">Roadmaps</a>
      <a href="quiz.html" style="text-decoration: none; color: #1e293b; padding: 12px; border-bottom: 1px solid #e2e8f0; display: block;">Quiz</a>
      <a href="about.html" style="text-decoration: none; color: #1e293b; padding: 12px; border-bottom: 1px solid #e2e8f0; display: block;">About</a>
      <a href="contact.html" style="text-decoration: none; color: #1e293b; padding: 12px; border-bottom: 1px solid #e2e8f0; display: block;">Contact</a>
      <a href="login.html" style="text-decoration: none; color: #0ea5e9; padding: 12px; display: block;">Sign In</a>
      <a href="signup.html" style="background: #0ea5e9; color: white; text-decoration: none; padding: 14px; text-align: center; border-radius: 8px; display: block; margin-top: 5px;">Get Started</a>
    </nav>
  </div>
</header>

<!-- CSS for Mobile Responsiveness -->
<style>
  /* Mobile styles */
  @media (max-width: 768px) {
    /* Hide desktop elements on mobile */
    .desktop-nav,
    .desktop-auth {
      display: none !important;
    }
    
    /* Show mobile menu button */
    #mobileMenuBtn {
      display: block !important;
    }
    
    /* Ensure mobile menu is visible when active */
    #mobileMenu.active {
      display: block !important;
    }
  }
  
  /* Desktop styles */
  @media (min-width: 769px) {
    .desktop-nav,
    .desktop-auth {
      display: flex !important;
    }
    #mobileMenuBtn {
      display: none !important;
    }
    #mobileMenu {
      display: none !important;
    }
  }
</style>

<!-- Mobile Menu Toggle Script -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const mobileBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    
    if (mobileBtn && mobileMenu) {
      mobileBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        
        // Toggle active class
        if (mobileMenu.classList.contains('active')) {
          mobileMenu.classList.remove('active');
          mobileMenu.style.display = 'none';
        } else {
          mobileMenu.classList.add('active');
          mobileMenu.style.display = 'block';
        }
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (!mobileBtn.contains(e.target) && !mobileMenu.contains(e.target)) {
          mobileMenu.classList.remove('active');
          mobileMenu.style.display = 'none';
        }
      });

      // Close menu when clicking on any link
      const mobileLinks = mobileMenu.querySelectorAll('a');
      mobileLinks.forEach(link => {
        link.addEventListener('click', function() {
          mobileMenu.classList.remove('active');
          mobileMenu.style.display = 'none';
        });
      });
    }
  });
</script>
