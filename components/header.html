    <a href="about.html" style="text-decoration: none; color: #1e293b; padding: 15px; border-bottom: 1px solid #f1f5f9; display: block; font-size: 16px; font-weight: 500;">👥 About</a>

    </div>
  </nav>
</div>

<!-- CSS for Mobile Responsiveness -->
<style>
  @media (max-width: 768px) {
    .desktop-nav,
    .desktop-auth {
      display: none !important;
    }
    #mobileMenuBtn {
      display: block !important;
    }
  }
  
  @media (min-width: 769px) {
    .desktop-nav,
    .desktop-auth {
      display: flex !important;
    }
    #mobileMenuBtn {
      display: none !important;
    }
    #mobileMenu {
      display: none !important;
    }
  }
</style>

<!-- Simple Mobile Menu Toggle Script -->
<script>
  // Simple direct toggle
  document.addEventListener('DOMContentLoaded', function() {
    const menuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    
    if (menuBtn && mobileMenu) {
      console.log('Mobile menu ready');
      
      menuBtn.onclick = function(e) {
        e.preventDefault();
        console.log('Button clicked');
        
        if (mobileMenu.style.display === 'none' || mobileMenu.style.display === '') {
          mobileMenu.style.display = 'block';
          console.log('Menu opened');
        } else {
          mobileMenu.style.display = 'none';
          console.log('Menu closed');
        }
      };
      
      // Close when clicking on any link
      const links = mobileMenu.querySelectorAll('a');
      for(let i = 0; i < links.length; i++) {
        links[i].onclick = function() {
          mobileMenu.style.display = 'none';
        };
      }
    } else {
      console.error('Menu elements not found');
    }
  });
</script>
