<style>
  @media (max-width: 768px) {
    .desktop-menu, .desktop-auth {
      display: none !important;
    }
    #mobileMenuBtn {
      display: block !important;
    }
  }
  
  @media (min-width: 769px) {
    .desktop-menu, .desktop-auth {
      display: flex !important;
    }
    #mobileMenuBtn {
      display: none !important;
    }
    #mobileMenu {
      display: none !important;
    }
  }
</style>
