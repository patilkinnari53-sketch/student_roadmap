<!-- Script for mobile menu functionality -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const menuButton = document.getElementById('menuButton');
    const closeMenu = document.getElementById('closeMenu');
    const mobileMenu = document.getElementById('mobileMenu');

    function openMenu() {
      mobileMenu.classList.remove('-translate-x-full');
      document.body.style.overflow = 'hidden';
    }

    function closeMenuFunc() {
      mobileMenu.classList.add('-translate-x-full');
      document.body.style.overflow = '';
    }

    menuButton.addEventListener('click', openMenu);
    closeMenu.addEventListener('click', closeMenuFunc);

    // Close menu when clicking on a link
    const menuLinks = mobileMenu.querySelectorAll('a');
    menuLinks.forEach(link => {
      link.addEventListener('click', closeMenuFunc);
    });

    // Close menu on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !mobileMenu.classList.contains('-translate-x-full')) {
        closeMenuFunc();
      }
    });
  });
</script>

<!-- Additional CSS for enhanced styling -->
<style>
  /* Enhanced hover effects */
  .header-glass {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
  }

  /* Mobile menu animations */
  .mobile-menu {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Desktop navigation link hover effect */
  .lg\\:flex a {
    position: relative;
  }

  .lg\\:flex a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
    transition: width 0.3s ease;
  }

  .lg\\:flex a:hover::after {
    width: 100%;
  }

  /* Button hover effects */
  #desktopAuthContainer a:last-child {
    position: relative;
    overflow: hidden;
  }

  #desktopAuthContainer a:last-child::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.2);
    transform: translate(-50%, -50%);
    transition: width 0.6s, height 0.6s;
  }

  #desktopAuthContainer a:last-child:hover::before {
    width: 300px;
    height: 300px;
  }

  /* Mobile menu auth buttons */
  #mobileAuthContainer button {
    transition: all 0.3s ease;
  }

  #mobileAuthContainer a:first-child button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px -5px var(--primary-color);
  }

  #mobileAuthContainer a:last-child button:hover {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    color: white;
    border-color: transparent;
  }

  /* Logo animation */
  .group:hover .w-10.h-10 {
    animation: bounce 0.5s ease;
  }

  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  /* Mobile menu items hover */
  #mobileMenu nav a {
    transition: all 0.3s ease;
  }

  #mobileMenu nav a:hover {
    transform: translateX(5px);
    background: linear-gradient(90deg, var(--primary-50), transparent);
  }

  /* Active link state */
  .nav-active {
    color: var(--primary-color);
    font-weight: 600;
  }

  .nav-active i {
    color: var(--primary-color);
  }

  /* Responsive adjustments */
  @media (max-width: 1024px) {
    header .container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
  }

  @media (max-width: 640px) {
    header .container {
      padding-top: 0.75rem;
      padding-bottom: 0.75rem;
    }
    
    .w-10.h-10 {
      width: 2.25rem;
      height: 2.25rem;
    }
    
    .text-xl {
      font-size: 1.1rem;
    }
    
    .text-xs {
      font-size: 0.65rem;
    }
  }

  /* Smooth scrolling for mobile menu */
  .mobile-menu {
    -webkit-overflow-scrolling: touch;
  }

  /* Backdrop blur enhancement */
  .backdrop-blur-xl {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* Gradient text for active states */
  .gradient-text {
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Mobile menu close button hover */
  #closeMenu:hover {
    transform: rotate(90deg);
  }

  /* Desktop auth buttons hover effect */
  #desktopAuthContainer a:first-child:hover {
    color: var(--primary-dark);
    transform: translateY(-1px);
  }

  /* Add these CSS variables if not already defined */
  :root {
    --primary-color: #8f3eff;
    --primary-dark: #7520e6;
    --primary-50: #f5f0ff;
    --secondary-color: #ff6b4a;
    --secondary-500: #ff6b4a;
    --primary-500: #8f3eff;
    --primary-600: #7520e6;
  }
</style>
